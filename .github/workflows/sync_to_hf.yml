# .github/workflows/sync_to_hf.yml
name: Sync to HuggingFace
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://krish1patel:$HF_TOKEN@huggingface.co/spaces/krish1patel/LevelEdge
          git push space main