# .github/workflows/run_forwardtest.yml
name: Forward Test

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 10:00 AM EDT (UTC-4)
    - cron: '0 16 * * 1-5'   # 12:00 PM EDT (UTC-4)
    - cron: '0 18 * * 1-5'   #  2:00 PM EDT (UTC-4)
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  forward-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90       # 4 tickers × all intervals × 8 strikes can take a while

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run forward test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/forwardtest.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: forward-test-logs-${{ github.run_id }}
          path: '*.log'
          retention-days: 7